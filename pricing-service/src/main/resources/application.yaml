spring:
  application:
    name: pricing-service

  datasource:
    url: jdbc:h2:mem:pricedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
